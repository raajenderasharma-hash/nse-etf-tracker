name: Daily NSE ETF Update
on:
  schedule:
    # 04:30 UTC is 10:00 AM IST (India Market Hours)
    - cron: '23 12 * * *'
  workflow_dispatch: # Allows manual run for testing
jobs:
  update_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install axios xmlbuilder2
      - name: Run Scraper
        run: node scraper.js
        env:
          SCRAPEOPS_API_KEY: ${{ secrets.SCRAPEOPS_API_KEY }}
      - name: Save Data to Repo
        run: |
          git config --global user.name "NSE-Bot"
          git config --global user.email "bot@github.com"
          git add nse_etf_data.xml
          git commit -m "Daily ETF Data Update [$(date)]" || exit 0
          git push
