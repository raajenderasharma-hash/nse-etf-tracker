name: Daily NSE ETF Update

on:
  schedule:
    # 4:45 UTC is 10:15 AM IST (Allows market to settle)
    - cron: '30 4 * * *'
  workflow_dispatch: # THIS ENABLES THE "RUN WORKFLOW" BUTTON
  push:
    branches: [ main ] # Runs whenever you change the code

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install axios xmlbuilder2

      - name: Run Scraper
        env:
          SCRAPEOPS_API_KEY: ${{ secrets.SCRAPEOPS_API_KEY }}
        # If the API fails, it will wait 60s and try one more time
        run: node scraper.js || (sleep 60 && node scraper.js)

      - name: Commit and Push XML
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add nse_etf_data.xml
          git commit -m "Automated Data Update: $(date)" || echo "No changes to commit"
          git push
          
